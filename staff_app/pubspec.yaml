name: staff_app
description: "Hotel POS Staff App - Attendance, Shift Clock-In/Out & Task Tracker"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  google_fonts: ^4.0.4
  http: ^0.13.5
  intl: ^0.18.0
  url_launcher: ^6.3.0
  provider: ^6.0.5
  shared_preferences: ^2.0.18
  flutter_animate: ^4.1.1
  home_widget: ^0.6.0
  pdf: ^3.10.8
  printing: ^5.11.0
  path_provider: ^2.1.2
  open_filex: ^4.5.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/staff.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/staff.png"
  min_sdk_android: 21
