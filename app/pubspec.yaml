name: hotel_pos
description: "A gorgeous, high-fidelity Hybrid Restaurant POS System for Web, Desktop, and Mobile."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation and State
  provider: ^6.1.2

  # HTTP & Sockets
  http: ^1.2.1
  web_socket_channel: ^2.4.5

  # Storage & Caching
  shared_preferences: ^2.3.2
  sqflite: ^2.3.2

  # Icons, Fonts & Styling
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0
  flutter_spinkit: ^5.2.1

  # Utilities
  intl: ^0.19.0
  barcode_widget: ^2.0.4
  qr_flutter: ^4.1.0
  flutter_tts: ^4.0.2
  file_picker: ^6.1.1
  pdf: ^3.10.8
  printing: ^5.11.0
  video_player: ^2.8.6
  video_player_win: ^3.2.2
  youtube_explode_dart: ^3.1.0
  package_info_plus: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  # Custom logo and Sinhala font assets
  assets:
    - assets/images/mhb_logo.png
    - assets/images/perpova logo.png
    - assets/fonts/NotoSansSinhala-Regular.ttf
    - assets/fonts/Isiagni.ttf

  fonts:
    - family: Isiagni
      fonts:
        - asset: assets/fonts/Isiagni.ttf

# ── App Launcher Icons ─────────────────────────────────────────────────────
flutter_launcher_icons:
  # Windows .ico icon (shown in taskbar, title bar, exe file)
  windows:
    generate: true
    image_path: "assets/images/mhb_logo.png"
    icon_size: 48  # min 48, max 256
