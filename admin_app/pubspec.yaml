name: hotel_admin_app
description: "Hotel POS Admin — Real-time monitoring & management for mobile"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP & WebSocket
  http: ^1.2.1
  web_socket_channel: ^2.4.5

  # Local storage
  shared_preferences: ^2.3.2

  # UI / Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0

  # Animations
  flutter_animate: ^4.5.0

  # PDF generation only (no printing dependency)
  pdf: ^3.10.8
  path_provider: ^2.1.2
  open_filex: ^4.5.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/admin.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/admin.png"
  min_sdk_android: 21
